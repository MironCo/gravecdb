name: gravecdb

services:
  gravecdb:
    build: .
    environment:
      GRAVECDB_DSN: "gravecdb://0.0.0.0:8080/data?embedder=ollama://ollama:11434/nomic-embed-text"
    ports:
      - "8080:8080"
    volumes:
      - ./data:/data
    depends_on:
      ollama-setup:
        condition: service_completed_successfully
    restart: unless-stopped

  ollama:
    image: ollama/ollama
    volumes:
      - ollama_models:/root/.ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 5s
      timeout: 5s
      retries: 10

  # One-shot container that pulls the model then exits
  ollama-setup:
    image: ollama/ollama
    volumes:
      - ollama_models:/root/.ollama
    depends_on:
      ollama:
        condition: service_healthy
    restart: "no"
    entrypoint: ["ollama", "pull", "nomic-embed-text"]
    environment:
      OLLAMA_HOST: "ollama:11434"

volumes:
  ollama_models: