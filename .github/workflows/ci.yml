name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Python venv for make test
        run: |
          python3 -m venv test_bolt/venv
          test_bolt/venv/bin/pip install -r test_bolt/requirements.txt

      - name: Build and start server
        run: |
          cd server && go build -o ../gravecdb .
          ./gravecdb &
          echo "SERVER_PID=$!" >> $GITHUB_ENV
          for i in $(seq 1 30); do
            if nc -z localhost 7687 2>/dev/null; then
              echo "Server ready after ${i}s"; exit 0
            fi
            sleep 1
          done
          echo "Server did not start in time" && exit 1

      - name: Run tests
        run: make test

      - name: Stop server
        if: always()
        run: kill $SERVER_PID 2>/dev/null || true
